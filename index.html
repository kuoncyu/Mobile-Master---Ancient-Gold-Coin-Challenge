<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>移動高手 - 完美對齊版</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');
        :root { --jade: #004d00; --gold: #ffd700; --bronze: #8b4513; --silk: #660000; --paper: #fdf5e6; }
        * { box-sizing: border-box; touch-action: none; -webkit-user-select: none; }
        body { margin: 0; background: #000; color: #f0e68c; font-family: "Microsoft JhengHei", serif; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #app { width: 100vw; height: 100vh; background: radial-gradient(circle, #3a0a0a 0%, #000 100%); position: relative; display: flex; flex-direction: column; border: 4px solid var(--bronze); }
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; padding: 20px; text-align: center; }
        .active { display: flex; }
        h1 { font-family: 'Ma Shan Zheng', cursive; font-size: clamp(2rem, 8vw, 3.5rem); color: var(--gold); margin: 10px 0; }
        
        /* 遊戲區 */
        #game-area { flex-grow: 1; position: relative; width: 100%; overflow: hidden; background: rgba(0,0,0,0.3); }
        .slot { position: absolute; border: 1px solid rgba(255, 215, 0, 0.15); border-radius: 50%; transform: translate(-50%, -50%); z-index: 1; pointer-events: none; }
        .coin { position: absolute; background: radial-gradient(circle, #f9d976 0%, #b28a15 60%, #8a6d10 100%); border: 2px solid #5a3e00; border-radius: 50%; z-index: 10; transform: translate(-50%, -50%); display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 8px #000; cursor: grab; }
        .coin::before { content: ""; width: 25%; height: 25%; background: #3d2b00; border: 1px solid var(--gold); }
        .coin.dragging { z-index: 100; opacity: 0.9; cursor: grabbing; }

        /* UI */
        .rank-container { width: 100%; max-width: 450px; background: var(--paper); color: #331a00; border: 3px double var(--bronze); padding: 10px; margin: 10px 0; }
        .rank-tabs { display: flex; overflow-x: auto; gap: 5px; border-bottom: 2px solid var(--bronze); margin-bottom: 5px; }
        .tab-btn { background: #d2b48c; border: 1px solid var(--bronze); padding: 5px 12px; font-size: 0.8rem; cursor: pointer; }
        .tab-btn.active { background: var(--silk); color: var(--gold); }
        .rank-list { height: 80px; overflow-y: auto; font-size: 0.85rem; }
        .lv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; max-width: 400px; }
        .lv-btn { background: var(--jade); color: var(--gold); border: 1px solid var(--gold); padding: 10px; border-radius: 4px; cursor: pointer; }
        .btn { background: var(--jade); color: var(--gold); border: 1px solid var(--gold); padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .stats-bar { width: 100%; padding: 10px; background: rgba(0,0,0,0.6); display: flex; justify-content: space-around; border-bottom: 1px solid var(--bronze); }
        .keyboard { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin-top: 15px; width: 100%; max-width: 500px; }
        .key { background: #333; padding: 12px 2px; border-radius: 4px; color: #fff; font-size: 0.75rem; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <div id="scr-lobby" class="screen active">
        <h1>移動高手</h1>
        <div class="rank-container">
            <div class="rank-tabs" id="rank-tabs"></div>
            <div id="rank-content" class="rank-list"></div>
        </div>
        <div class="lv-grid" id="lv-grid"></div>
        <button class="btn" style="margin-top:15px" onclick="toggleFS()">⛶ 全螢幕</button>
    </div>

    <div id="scr-login" class="screen">
        <h2 style="color:var(--gold)">閣下尊姓大名?</h2>
        <input type="text" id="username" readonly style="width:280px; font-size:2rem; text-align:center; background:#000; border:2px solid var(--gold); color:var(--gold);">
        <div class="keyboard" id="kb"></div>
        <div style="margin-top:20px;">
            <button class="btn" style="background:#444" onclick="delKey()">退格</button>
            <button class="btn" onclick="confirmLogin()">開始挑戰</button>
        </div>
    </div>

    <div id="scr-game" class="screen" style="padding:0;">
        <div class="stats-bar">
            <span>玩家: <b id="st-name"></b></span>
            <span>層數: <b id="st-lv"></b></span>
            <span>步數: <b id="st-moves">0</b></span>
        </div>
        <div id="game-area"></div>
        <div style="padding: 15px; display: flex; gap: 10px;">
            <button class="btn" style="background:#444" onclick="toLobby()">首頁</button>
            <button class="btn" onclick="initLevel()">重置</button>
            <button class="btn" style="background:var(--silk)" onclick="checkWin()">完成</button>
        </div>
    </div>
</div>

<script>
    const actx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(f, d) {
        const o = actx.createOscillator(); const g = actx.createGain();
        o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + d);
        o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime + d);
    }

    let curLv = 2, moves = 0, pName = localStorage.getItem('p_name') || "", viewRankLv = 2;
    let gap, vGap, centerX, centerY, coinSize;

    // --- 初始化 UI ---
    function initLobby() {
        const grid = document.getElementById('lv-grid');
        const tabs = document.getElementById('rank-tabs');
        grid.innerHTML = ""; tabs.innerHTML = "";
        for (let i = 2; i <= 10; i++) {
            const lb = document.createElement('div'); lb.className = 'lv-btn';
            lb.innerHTML = `<b>${i}層</b><br><small>${(i*(i+1))/2}枚</small>`;
            lb.onclick = () => { curLv = i; pName ? startGame() : show('scr-login'); };
            grid.appendChild(lb);

            const tb = document.createElement('div'); tb.className = `tab-btn ${i === viewRankLv ? 'active' : ''}`;
            tb.innerText = `${i}層`; tb.onclick = () => { viewRankLv = i; updateRankView(); };
            tabs.appendChild(tb);
        }
        updateRankView();
    }

    function updateRankView() {
        document.querySelectorAll('.tab-btn').forEach((b, idx) => b.classList.toggle('active', (idx + 2) === viewRankLv));
        const content = document.getElementById('rank-content');
        let allRanks = JSON.parse(localStorage.getItem('ranks_v5') || "{}");
        let lvData = allRanks[viewRankLv] || [];
        content.innerHTML = lvData.length === 0 ? `<p>第 ${viewRankLv} 層暫無紀錄</p>` : 
            lvData.map((r, i) => `<div style="display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px dashed #ccc"><span>${i+1}. ${r.name}</span><span>${r.moves}步</span></div>`).join("");
    }

    // --- 鍵盤 ---
    const kb = document.getElementById('kb');
    "QWERTYUIOPASDFGHJKLZXCVBNM".split("").forEach(k => {
        const d = document.createElement('div'); d.className = 'key'; d.innerText = k;
        d.onclick = () => { document.getElementById('username').value += k; beep(440, 0.1); };
        kb.appendChild(d);
    });
    function delKey() { const i = document.getElementById('username'); i.value = i.value.slice(0,-1); }
    function confirmLogin() { pName = document.getElementById('username').value || "HERO"; localStorage.setItem('p_name', pName); startGame(); }

    function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); if (id === 'scr-lobby') initLobby(); }
    function toLobby() { show('scr-lobby'); }
    function toggleFS() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

    function startGame() { document.getElementById('st-name').innerText = pName; document.getElementById('st-lv').innerText = curLv + "層"; show('scr-game'); initLevel(); }

    // --- 核心幾何計算 (修正對齊) ---
    function getPos(r, c) {
        // 使用嚴格的幾何公式
        return {
            x: centerX + (c * gap) - (r * gap / 2),
            y: centerY + (r * vGap)
        };
    }

    function initLevel() {
        const area = document.getElementById('game-area');
        area.innerHTML = ""; moves = 0; document.getElementById('st-moves').innerText = 0;

        const rect = area.getBoundingClientRect();
        centerX = rect.width / 2;
        centerY = rect.height / 2;
        
        // 自動縮放
        coinSize = Math.min(50, (rect.width / (curLv + 3)), (rect.height / (curLv * 2.5)));
        gap = coinSize + 6;
        vGap = gap * 0.866025; // 精確的 sin(60°)

        // 1. 鋪設大型對齊網格
        const rBound = Math.ceil(rect.height / vGap);
        const cBound = Math.ceil(rect.width / gap);

        for (let r = -rBound; r <= rBound; r++) {
            for (let c = -cBound; c <= cBound; c++) {
                const pos = getPos(r, c);
                if (pos.x > 10 && pos.x < rect.width - 10 && pos.y > 10 && pos.y < rect.height - 10) {
                    const s = document.createElement('div');
                    s.className = 'slot';
                    s.style.width = s.style.height = coinSize + 'px';
                    s.style.left = pos.x + 'px'; s.style.top = pos.y + 'px';
                    s.dataset.r = r; s.dataset.c = c;
                    area.appendChild(s);
                }
            }
        }

        // 2. 放置金幣 (置中正三角)
        const offsetR = (curLv - 1) / 2; // 垂直偏移量
        for (let r = 0; r < curLv; r++) {
            for (let c = 0; c <= r; c++) {
                const targetR = r - Math.floor(offsetR);
                const targetC = c;
                const pos = getPos(targetR, targetC);
                createCoin(pos.x, pos.y, targetR, targetC);
            }
        }
    }

    function createCoin(startX, startY, initR, initC) {
        const area = document.getElementById('game-area');
        const c = document.createElement('div');
        c.className = 'coin';
        c.style.width = c.style.height = coinSize + 'px';
        c.style.left = startX + 'px'; c.style.top = startY + 'px';
        c.dataset.r = initR; c.dataset.c = initC;

        let isDown = false;
        c.onpointerdown = (e) => { isDown = true; c.setPointerCapture(e.pointerId); c.classList.add('dragging'); beep(600, 0.05); };
        c.onpointermove = (e) => {
            if (!isDown) return;
            const r = area.getBoundingClientRect();
            c.style.left = (e.clientX - r.left) + 'px';
            c.style.top = (e.clientY - r.top) + 'px';
        };
        c.onpointerup = () => {
            if (!isDown) return; isDown = false;
            c.classList.remove('dragging');
            
            const curX = parseFloat(c.style.left);
            const curY = parseFloat(c.style.top);
            let bestSlot = null;
            let minD = coinSize * 0.8;

            document.querySelectorAll('.slot').forEach(s => {
                const dx = parseFloat(s.style.left) - curX;
                const dy = parseFloat(s.style.top) - curY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < minD) { minD = dist; bestSlot = s; }
            });

            if (bestSlot) {
                // 如果移動到了不同的格子
                if (bestSlot.dataset.r != c.dataset.r || bestSlot.dataset.c != c.dataset.c) {
                    moves++;
                    document.getElementById('st-moves').innerText = moves;
                    c.dataset.r = bestSlot.dataset.r;
                    c.dataset.c = bestSlot.dataset.c;
                }
                c.style.left = bestSlot.style.left;
                c.style.top = bestSlot.style.top;
                beep(300, 0.1);
            } else {
                // 沒對準彈回原格點
                const oldPos = getPos(parseInt(c.dataset.r), parseInt(c.dataset.c));
                c.style.left = oldPos.x + 'px';
                c.style.top = oldPos.y + 'px';
            }
        };
        area.appendChild(c);
    }

    function checkWin() {
        const coins = Array.from(document.querySelectorAll('.coin')).map(c => parseInt(c.dataset.r)).sort((a,b) => a - b);
        let rows = [];
        if(coins.length > 0) {
            let lastR = coins[0], count = 0;
            coins.forEach(r => {
                if (r === lastR) count++;
                else { rows.push(count); count = 1; lastR = r; }
            });
            rows.push(count);
        }

        // 檢查是否符合倒三角 (例如 3層: [3, 2, 1])
        let isWin = rows.length === curLv;
        if(isWin) {
            for(let i=0; i<rows.length; i++) if(rows[i] !== (curLv - i)) isWin = false;
        }

        if(isWin) {
            beep(880, 0.3);
            let all = JSON.parse(localStorage.getItem('ranks_v5') || "{}");
            if (!all[curLv]) all[curLv] = [];
            all[curLv].push({ name: pName, moves: moves });
            all[curLv].sort((a, b) => a.moves - b.moves);
            all[curLv] = all[curLv].slice(0, 5);
            localStorage.setItem('ranks_v5', JSON.stringify(all));
            alert(`成功倒轉！層數: ${curLv}, 步數: ${moves}`);
            show('scr-lobby');
        } else {
            alert("尚未排列成倒三角！目前各層分佈為: " + rows.join(", "));
        }
    }

    initLobby();
    window.onresize = () => { if(document.getElementById('scr-game').classList.contains('active')) initLevel(); };
</script>
</body>
</html>
